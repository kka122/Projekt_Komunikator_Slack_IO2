register:
  post:
    operationId: registerUser
    tags: [ Auth ]
    summary: Register a new user
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../openapi.yaml#/components/schemas/RegisterRequest'

    responses:
      '201':
        description: User registered successfully
      '400':
        description: Bad request - invalid input data

login:
  post:
    operationId: loginUser
    tags: [ Auth ]
    summary: Log in a user and obtain an authentication token
    security: []
    requestBody:
      required: true
      content:
        application/json:
          schema:
            $ref: '../openapi.yaml#/components/schemas/LoginRequest'

    responses:
      '200':
        description: User logged in successfully
        headers:
          Set-Cookie:
            description: Authentication token set in a cookie
            schema:
              type: string

      '400':
        description: Bad request - invalid input data
      '401':
        description: Unauthorized - invalid credentials