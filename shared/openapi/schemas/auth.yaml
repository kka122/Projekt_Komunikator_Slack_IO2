RegisterRequest:
  type: object
  required: [ name, surname, email, password ]
  properties:
    name:
      type: string
      example: John
    surname:
      type: string
      example: Doe
    email:
      type: string
      format: email
      example: john.doe@example.com
    password:
      type: string
      format: password
      example: Qwerty123!@#
    avatar:
      type: string
      format: binary
      description: Optional avatar image file

LoginRequest:
  type: object
  required: [ email, password ]
  properties:
    email:
      type: string
      format: email
      example: john.doe@example.com
    password:
      type: string
      format: password
      example: Qwerty123!@#