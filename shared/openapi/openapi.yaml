openapi: 3.1.0

info:
  title: Szponcik communicator API
  version: 0.0.1

tags:
  - name: Auth
    description: Endpoints related to user authentication and registration
  - name: Payment
    description: Endpoints related to payment processing
  - name: Workspace
    description: Endpoints related to workspaces
  - name: Channel
    description: Endpoints related to channels
  - name: Direct Chat
    description: Endpoints related to direct chats between users
  - name: Message
    description: Endpoints related to messages in channels and direct chats
  - name: User
    description: Endpoints related to user profile and settings

servers:
  - url: http://localhost:5000/api
    description: Local development server

components:
  securitySchemes:
    TokenAuth:
      type: apiKey
      in: cookie
      name: access_token
    RefreshTokenAuth:
      type: apiKey
      in: cookie
      name: refresh_token

  schemas:
    # ----- Error -----
    ErrorResponse:
      type: object
      required: [ error ]
      properties:
        error:
          type: string
          example: Something went wrong

    # ----- Auth -----
    RegisterRequest:
      type: object
      required: [ name, surname, email, password ]
      properties:
        name:
          type: string
          example: John
        surname:
          type: string
          example: Doe
        email:
          type: string
          format: email
          example: john.doe@example.com
        password:
          type: string
          format: password
          example: Qwerty123!@#
        avatar:
          type: string
          format: binary
          description: Optional avatar image file

    LoginRequest:
      type: object
      required: [ email, password ]
      properties:
        email:
          type: string
          format: email
          example: john.doe@example.com
        password:
          type: string
          format: password
          example: Qwerty123!@#

    GoogleAuthRequest:
      type: object
      required: [ token ]
      properties:
        token:
          type: string
          description: Google OAuth token obtained from the client

    # ----- Payment -----
    CreatePaymentResponse:
      type: object
      required: [ clientSecret ]
      properties:
        clientSecret:
          type: string
          description: Secret key generated by Stripe for processing the payment

    # ----- Workspace -----
    CreateWorkspaceRequest:
      type: object
      required: [ workspaceName ]
      properties:
        workspaceName:
          type: string
          example: My Workspace

    ConfirmWorkspacePaymentRequest:
      type: object
      required: [ paymentIntentId, workspaceName ]
      properties:
        paymentIntentId:
          type: string
          description: ID of the Stripe Payment Intent to confirm
        workspaceName:
          type: string
          example: My Workspace

security:
  - TokenAuth: [ ]

paths:
  # ----- Auth -----
  /auth/register:
    post:
      operationId: registerUser
      tags: [ Auth ]
      summary: Register a new user
      security: [ ]
      requestBody:
        required: true
        content:
          # TODO: change to multipart/form-data when avatar upload is implemented
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'

      responses:
        '201':
          description: User registered successfully
        '400':
          description: Bad request - invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict - email already in use
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/login:
    post:
      operationId: loginUser
      tags: [ Auth ]
      summary: Log in a user and obtain an authentication token
      security: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'

      responses:
        '200':
          description: User logged in successfully
          headers:
            Set-Cookie:
              description: Sets both access_token and refresh_token cookies
              schema:
                type: string

        '400':
          description: Bad request - invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/google:
    post:
      operationId: googleAuth
      tags: [ Auth ]
      summary: Authenticate a user using Google OAuth token
      security: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GoogleAuthRequest'

      responses:
        '200':
          description: User authenticated successfully
          headers:
            Set-Cookie:
              description: Sets both access_token and refresh_token cookies
              schema:
                type: string

        '400':
          description: Bad request - invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - invalid Google token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/refresh:
    post:
      operationId: refreshToken
      tags: [ Auth ]
      summary: Refresh the authentication token using the refresh token
      security:
        - RefreshTokenAuth: [ ]

      responses:
        '200':
          description: Token refreshed successfully
          headers:
            Set-Cookie:
              description: Sets a new access_token cookie
              schema:
                type: string

        '401':
          description: Unauthorized - invalid or expired refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden - refresh token revoked or not valid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # ----- Workspace -----
  /workspace/create:
    post:
      operationId: createWorkspace
      tags: [ Workspace ]
      security:
        - TokenAuth: [ ]
      summary: Create a new workspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkspaceRequest'

      responses:
        '200':
          description: Workspace payment client secret generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreatePaymentResponse'

        '400':
          description: Bad request - invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - user not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict - workspace name already in use
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /workspace/confirm-payment:
    post:
      operationId: confirmWorkspacePayment
      tags: [ Workspace ]
      security:
        - TokenAuth: [ ]
      summary: Confirm the workspace payment after successful Stripe transaction
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConfirmWorkspacePaymentRequest'

      responses:
        '202':
          description: Workspace waiting for creation

        '400':
          description: Bad request - invalid input data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized - user not authenticated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '402':
          description: Payment required - payment not completed or failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict - workspace name already in use
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'