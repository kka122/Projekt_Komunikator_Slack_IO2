openapi: 3.1.0

info:
  title: Szponcik communicator API
  version: 0.0.1

tags:
  - name: Auth
    description: User authentication and registration

  - name: Workspace
    description: Workspaces management

  - name: Channel
    description: Channels management

  - name: Direct Chat
    description: Direct chats management

  - name: Message
    description: Messages in channels and direct chats management

  - name: Reaction
    description: Reactions to messages management

  - name: Attachment
    description: Attachments management

  - name: User
    description: User profile and settings management

servers:
  - url: http://localhost:5000/api
    description: Local server

components:
  securitySchemes:
    TokenAuth:
      type: apiKey
      in: cookie
      name: access_token

    RefreshTokenAuth:
      type: apiKey
      in: cookie
      name: refresh_token

security:
  - TokenAuth: [ ]

paths:
  # ----- Auth -----
  /auth/register:
    post:
      operationId: registerUser
      tags: [ Auth ]
      summary: Register a new user
      description: Create a new user account with the provided information. The profile picture is optional and can be uploaded as part of the registration process.
      security: [ ]

      requestBody:
        $ref: 'components/requestBodies/auth.yaml#/RegisterRequest'

      responses:
        '201':
          description: User registered successfully

        '400':
          $ref: 'components/responses/error.yaml#/400'
        '409':
          $ref: 'components/responses/error.yaml#/409'

  /auth/login:
    post:
      operationId: loginUser
      tags: [ Auth ]
      summary: Log in a user and obtain an authentication token
      description: Authenticate a user with their email and password. On successful authentication, sets both access_token and refresh_token cookies for session management.
      security: [ ]

      requestBody:
        $ref: 'components/requestBodies/auth.yaml#/LoginRequest'

      responses:
        '200':
          $ref: 'components/responses/auth.yaml#/LoginResponse'

        '400':
          $ref: 'components/responses/error.yaml#/400'
        '401':
          $ref: 'components/responses/error.yaml#/401'

  /auth/google:
    post:
      operationId: googleAuth
      tags: [ Auth ]
      summary: Authenticate a user using Google OAuth token
      description: Authenticate a user with a Google OAuth token. On successful authentication, sets both access_token and refresh_token cookies for session management.
      security: [ ]

      requestBody:
        $ref: 'components/requestBodies/auth.yaml#/GoogleAuthRequest'

      responses:
        '200':
          $ref: 'components/responses/auth.yaml#/LoginResponse'

        '400':
          $ref: 'components/responses/error.yaml#/400'
        '401':
          $ref: 'components/responses/error.yaml#/401'

  /auth/refresh:
    post:
      operationId: refreshToken
      tags: [ Auth ]
      summary: Refresh the authentication token using the refresh token
      description: Use the refresh token to obtain a new access token. This endpoint requires a valid refresh_token cookie and will set a new access_token cookie on success.
      security:
        - RefreshTokenAuth: [ ]

      responses:
        '200':
          $ref: 'components/responses/auth.yaml#/TokenRefreshResponse'

        '401':
          $ref: 'components/responses/error.yaml#/401'
        '403':
          $ref: 'components/responses/error.yaml#/403'

  /auth/logout:
    post:
      operationId: logoutUser
      tags: [ Auth ]
      summary: Log out the authenticated user
      description: Log out the currently authenticated user by clearing the access_token and refresh_token cookies.
      security:
        - TokenAuth: [ ]

      responses:
        '200':
          $ref: 'components/responses/auth.yaml#/LogoutResponse'

        '401':
          $ref: 'components/responses/error.yaml#/401'

  # ----- Workspace -----
  /workspaces:
    post:
      operationId: createWorkspace
      tags: [ Workspace ]
      summary: Create a new workspace
      description: Create a new workspace with the provided name and optional logo. The user creating the workspace will be set as the owner. To create workspace client need complete payment using returned Stripe Payment Intent client secret.
      security:
        - TokenAuth: [ ]

      requestBody:
        $ref: 'components/requestBodies/workspace.yaml#/CreateWorkspaceRequest'

      responses:
        '201':
          $ref: 'components/responses/payment.yaml#/CreatePaymentResponse'

        '400':
          $ref: 'components/responses/error.yaml#/400'
        '401':
          $ref: 'components/responses/error.yaml#/401'

    get:
      operationId: listWorkspaces
      tags: [ Workspace ]
      summary: List all workspaces the user is a member of
      description: Retrieve a list of all workspaces that the authenticated user is a member of, including their roles within each workspace.
      security:
        - TokenAuth: [ ]

      responses:
        '200':
          $ref: 'components/responses/workspace.yaml#/WorkspaceListResponse'

        '401':
          $ref: 'components/responses/error.yaml#/401'

  /workspaces/accept-payment:
    post:
      operationId: acceptWorkspacePayment
      tags: [ Workspace ]
      summary: Accept payment for workspace creation
      description: Confirm the Stripe Payment Intent for workspace creation. This endpoint should be called after the client completes the payment process using the client secret provided in the response of the workspace creation endpoint.
      security:
        - TokenAuth: [ ]

      requestBody:
        $ref: 'components/requestBodies/payment.yaml#/AcceptPaymentRequest'

      responses:
        '200':
          description: Payment accepted and workspace created successfully

        '400':
          $ref: 'components/responses/error.yaml#/400'
        '401':
          $ref: 'components/responses/error.yaml#/401'
        '402':
          $ref: 'components/responses/error.yaml#/402'

  /workspaces/{workspaceId}:
    patch:
      operationId: updateWorkspaceLogo
      tags: [ Workspace ]
      summary: Update workspace logo
      description: Update the logo of an existing workspace. Only the workspace owner can update the logo.
      security:
        - TokenAuth: [ ]
      parameters:
        - $ref: 'components/parameters/workspace.yaml#/WorkspaceIDParameter'

      requestBody:
        $ref: 'components/requestBodies/workspace.yaml#/UpdateWorkspaceLogoRequest'

      responses:
        '200':
          description: Workspace logo updated successfully
        '400':
          $ref: 'components/responses/error.yaml#/400'
        '401':
          $ref: 'components/responses/error.yaml#/401'
        '403':
          $ref: 'components/responses/error.yaml#/403'
        '404':
          $ref: 'components/responses/error.yaml#/404'

  # ----- Channel -----
  /workspaces/{workspaceId}/channels:
    post:
      operationId: createChannel
      tags: [ Channel ]
      summary: Create a new channel in a workspace
      description: Create a new channel within the specified workspace. The user creating the channel will be added as a member of that channel. Only owners and admins of the workspace can create channels.
      security:
        - TokenAuth: [ ]
      parameters:
        - $ref: 'components/parameters/workspace.yaml#/WorkspaceIDParameter'

      requestBody:
        $ref: 'components/requestBodies/channel.yaml#/CreateChannelRequest'

      responses:
        '201':
          description: Channel created successfully

        '400':
          $ref: 'components/responses/error.yaml#/400'
        '401':
          $ref: 'components/responses/error.yaml#/401'
        '403':
          $ref: 'components/responses/error.yaml#/403'
        '404':
          $ref: 'components/responses/error.yaml#/404'

    get:
      operationId: listChannels
      tags: [ Channel ]
      summary: List all channels in a workspace
      description: Retrieve a list of all channels within the specified workspace.
      security:
        - TokenAuth: [ ]
      parameters:
        - $ref: 'components/parameters/workspace.yaml#/WorkspaceIDParameter'

      responses:
        '200':
          $ref: 'components/responses/channel.yaml#/ChannelListResponse'

        '400':
          $ref: 'components/responses/error.yaml#/400'
        '401':
          $ref: 'components/responses/error.yaml#/401'
        '403':
          $ref: 'components/responses/error.yaml#/403'
        '404':
          $ref: 'components/responses/error.yaml#/404'

  /workspaces/{workspaceId}/channels/{channelId}:
    patch:
      operationId: updateChannelName
      tags: [ Channel ]
      summary: Update the name of a channel
      description: Update the name of an existing channel within the specified workspace. Only owners and admins of the workspace can update channel names.
      security:
        - TokenAuth: [ ]
      parameters:
        - $ref: 'components/parameters/workspace.yaml#/WorkspaceIDParameter'
        - $ref: 'components/parameters/channel.yaml#/ChannelIDParameter'

      requestBody:
        $ref: 'components/requestBodies/channel.yaml#/UpdateChannelNameRequest'

      responses:
        '200':
          description: Channel name updated successfully

        '400':
          $ref: 'components/responses/error.yaml#/400'
        '401':
          $ref: 'components/responses/error.yaml#/401'
        '403':
          $ref: 'components/responses/error.yaml#/403'
        '404':
          $ref: 'components/responses/error.yaml#/404'

    delete:
      operationId: deleteChannel
      tags: [ Channel ]
      summary: Delete a channel from a workspace
      description: Delete an existing channel from the specified workspace. Only owners and admins of the workspace can delete channels.
      security:
        - TokenAuth: [ ]
      parameters:
        - $ref: 'components/parameters/workspace.yaml#/WorkspaceIDParameter'
        - $ref: 'components/parameters/channel.yaml#/ChannelIDParameter'

      responses:
        '200':
          description: Channel deleted successfully

        '400':
          $ref: 'components/responses/error.yaml#/400'
        '401':
          $ref: 'components/responses/error.yaml#/401'
        '403':
          $ref: 'components/responses/error.yaml#/403'
        '404':
          $ref: 'components/responses/error.yaml#/404'

  # ----- Direct Chat -----
  /workspaces/{workspaceId}/direct-chats:
    get:
      operationId: listDirectChats
      tags: [ Direct Chat ]
      summary: List all direct chats in a workspace
      description: Retrieve a list of all direct chats that the authenticated user is a part of within the specified workspace.
      security:
        - TokenAuth: [ ]
      parameters:
        - $ref: 'components/parameters/workspace.yaml#/WorkspaceIDParameter'

      responses:
        '200':
          $ref: 'components/responses/directChat.yaml#/DirectChatListResponse'

        '400':
          $ref: 'components/responses/error.yaml#/400'
        '401':
          $ref: 'components/responses/error.yaml#/401'
        '403':
          $ref: 'components/responses/error.yaml#/403'
        '404':
          $ref: 'components/responses/error.yaml#/404'

  # ----- Message -----
  /workspaces/{workspaceId}/channels/{channelId}/messages:
    post:
      operationId: createChannelMessage
      tags: [ Message ]
      summary: Create a new message in a channel
      description: Create a new message within the specified channel. The authenticated user will be set as the author of the message. Only members of the channel can create messages.
      security:
        - TokenAuth: [ ]
      parameters:
        - $ref: 'components/parameters/workspace.yaml#/WorkspaceIDParameter'
        - $ref: 'components/parameters/channel.yaml#/ChannelIDParameter'

      requestBody:
        $ref: 'components/requestBodies/message.yaml#/CreateMessageRequest'

      responses:
        '201':
          description: Message created successfully

        '400':
          $ref: 'components/responses/error.yaml#/400'
        '401':
          $ref: 'components/responses/error.yaml#/401'
        '403':
          $ref: 'components/responses/error.yaml#/403'
        '404':
          $ref: 'components/responses/error.yaml#/404'

  /workspaces/{workspaceId}/channels/{channelId}/messages/{page}/{pageSize}:
    get:
      operationId: listChannelMessages
      tags: [ Message ]
      summary: List messages in a channel with pagination
      description: Retrieve a paginated list of messages within the specified channel. Only members of the channel can view its messages.
      security:
        - TokenAuth: [ ]
      parameters:
        - $ref: 'components/parameters/workspace.yaml#/WorkspaceIDParameter'
        - $ref: 'components/parameters/channel.yaml#/ChannelIDParameter'
        - $ref: 'components/parameters/pagination.yaml#/PageParameter'
        - $ref: 'components/parameters/pagination.yaml#/PageSizeParameter'

      responses:
        '200':
          $ref: 'components/responses/message.yaml#/MessageListResponse'

        '400':
          $ref: 'components/responses/error.yaml#/400'
        '401':
          $ref: 'components/responses/error.yaml#/401'
        '403':
          $ref: 'components/responses/error.yaml#/403'
        '404':
          $ref: 'components/responses/error.yaml#/404'

  /workspaces/{workspaceId}/channels/{channelId}/messages/{messageId}:
    patch:
      operationId: updateChannelMessage
      tags: [ Message ]
      summary: Update a message in a channel
      description: Update the content of an existing message within the specified channel. Only the author of the message can update it.
      security:
        - TokenAuth: [ ]
      parameters:
        - $ref: 'components/parameters/workspace.yaml#/WorkspaceIDParameter'
        - $ref: 'components/parameters/channel.yaml#/ChannelIDParameter'
        - $ref: 'components/parameters/message.yaml#/MessageIDParameter'

      requestBody:
        $ref: 'components/requestBodies/message.yaml#/UpdateMessageRequest'

      responses:
        '200':
          description: Message updated successfully

        '400':
          $ref: 'components/responses/error.yaml#/400'
        '401':
          $ref: 'components/responses/error.yaml#/401'
        '403':
          $ref: 'components/responses/error.yaml#/403'
        '404':
          $ref: 'components/responses/error.yaml#/404'

    delete:
      operationId: deleteChannelMessage
      tags: [ Message ]
      summary: Delete a message from a channel
      description: Delete an existing message from the specified channel. Only the author of the message or workspace admins can delete messages.
      security:
        - TokenAuth: [ ]
      parameters:
        - $ref: 'components/parameters/workspace.yaml#/WorkspaceIDParameter'
        - $ref: 'components/parameters/channel.yaml#/ChannelIDParameter'
        - $ref: 'components/parameters/message.yaml#/MessageIDParameter'

      responses:
        '200':
          description: Message deleted successfully

        '400':
          $ref: 'components/responses/error.yaml#/400'
        '401':
          $ref: 'components/responses/error.yaml#/401'
        '403':
          $ref: 'components/responses/error.yaml#/403'
        '404':
          $ref: 'components/responses/error.yaml#/404'

  /workspaces/{workspaceId}/direct-chats/{directChatId}/messages:
    post:
      operationId: createDirectChatMessage
      tags: [ Message ]
      summary: Create a new message in a direct chat
      description: Create a new message within the specified direct chat. The authenticated user will be set as the author of the message. Only members of the direct chat can create messages.
      security:
        - TokenAuth: [ ]
      parameters:
        - $ref: 'components/parameters/workspace.yaml#/WorkspaceIDParameter'
        - $ref: 'components/parameters/directChat.yaml#/DirectChatIDParameter'

      requestBody:
        $ref: 'components/requestBodies/message.yaml#/CreateMessageRequest'

      responses:
        '201':
          description: Message created successfully

        '400':
          $ref: 'components/responses/error.yaml#/400'
        '401':
          $ref: 'components/responses/error.yaml#/401'
        '403':
          $ref: 'components/responses/error.yaml#/403'
        '404':
          $ref: 'components/responses/error.yaml#/404'

  /workspaces/{workspaceId}/direct-chats/{directChatId}/messages/{page}/{pageSize}:
    get:
      operationId: listDirectChatMessages
      tags: [ Message ]
      summary: List messages in a direct chat with pagination
      description: Retrieve a paginated list of messages within the specified direct chat. Only members of the direct chat can view its messages.
      security:
        - TokenAuth: [ ]
      parameters:
        - $ref: 'components/parameters/workspace.yaml#/WorkspaceIDParameter'
        - $ref: 'components/parameters/directChat.yaml#/DirectChatIDParameter'
        - $ref: 'components/parameters/pagination.yaml#/PageParameter'
        - $ref: 'components/parameters/pagination.yaml#/PageSizeParameter'

      responses:
        '200':
          $ref: 'components/responses/message.yaml#/MessageListResponse'

        '400':
          $ref: 'components/responses/error.yaml#/400'
        '401':
          $ref: 'components/responses/error.yaml#/401'
        '403':
          $ref: 'components/responses/error.yaml#/403'
        '404':
          $ref: 'components/responses/error.yaml#/404'

  /workspaces/{workspaceId}/direct-chats/{directChatId}/messages/{messageId}:
    patch:
      operationId: updateDirectChatMessage
      tags: [ Message ]
      summary: Update a message in a direct chat
      description: Update the content of an existing message within the specified direct chat. Only the author of the message can update it.
      security:
        - TokenAuth: [ ]
      parameters:
        - $ref: 'components/parameters/workspace.yaml#/WorkspaceIDParameter'
        - $ref: 'components/parameters/directChat.yaml#/DirectChatIDParameter'
        - $ref: 'components/parameters/message.yaml#/MessageIDParameter'

      requestBody:
        $ref: 'components/requestBodies/message.yaml#/UpdateMessageRequest'

      responses:
        '200':
          description: Message updated successfully

        '400':
          $ref: 'components/responses/error.yaml#/400'
        '401':
          $ref: 'components/responses/error.yaml#/401'
        '403':
          $ref: 'components/responses/error.yaml#/403'
        '404':
          $ref: 'components/responses/error.yaml#/404'

    delete:
      operationId: deleteDirectChatMessage
      tags: [ Message ]
      summary: Delete a message from a direct chat
      description: Delete an existing message from the specified direct chat. Only the author of the message or workspace admins can delete messages.
      security:
        - TokenAuth: [ ]
      parameters:
        - $ref: 'components/parameters/workspace.yaml#/WorkspaceIDParameter'
        - $ref: 'components/parameters/directChat.yaml#/DirectChatIDParameter'
        - $ref: 'components/parameters/message.yaml#/MessageIDParameter'

      responses:
        '200':
          description: Message deleted successfully

        '400':
          $ref: 'components/responses/error.yaml#/400'
        '401':
          $ref: 'components/responses/error.yaml#/401'
        '403':
          $ref: 'components/responses/error.yaml#/403'
        '404':
          $ref: 'components/responses/error.yaml#/404'

  # ----- Reaction -----
  /workspaces/{workspaceId}/channels/{channelId}/messages/{messageId}/reactions:
    post:
      operationId: addReactionToChannelMessage
      tags: [ Reaction ]
      summary: Add a reaction to a message in a channel
      description: Add a reaction to a specific message within a channel. The authenticated user will be set as the author of the reaction. Only members of the channel can add reactions to its messages.
      security:
        - TokenAuth: [ ]
      parameters:
        - $ref: 'components/parameters/workspace.yaml#/WorkspaceIDParameter'
        - $ref: 'components/parameters/channel.yaml#/ChannelIDParameter'
        - $ref: 'components/parameters/message.yaml#/MessageIDParameter'

      requestBody:
        $ref: 'components/requestBodies/reaction.yaml#/AddReactionRequest'

      responses:
        '201':
          description: Reaction added successfully

        '400':
          $ref: 'components/responses/error.yaml#/400'
        '401':
          $ref: 'components/responses/error.yaml#/401'
        '403':
          $ref: 'components/responses/error.yaml#/403'
        '404':
          $ref: 'components/responses/error.yaml#/404'

  /workspaces/{workspaceId}/channels/{channelId}/messages/{messageId}/reactions/{reactionId}:
    delete:
      operationId: removeReactionFromChannelMessage
      tags: [ Reaction ]
      summary: Remove a reaction from a message in a channel
      description: Remove an existing reaction from a specific message within a channel. Only the author of the reaction or workspace admins can remove reactions.
      security:
        - TokenAuth: [ ]
      parameters:
        - $ref: 'components/parameters/workspace.yaml#/WorkspaceIDParameter'
        - $ref: 'components/parameters/channel.yaml#/ChannelIDParameter'
        - $ref: 'components/parameters/message.yaml#/MessageIDParameter'
        - $ref: 'components/parameters/reaction.yaml#/ReactionIDParameter'

      responses:
        '200':
          description: Reaction removed successfully

        '400':
          $ref: 'components/responses/error.yaml#/400'
        '401':
          $ref: 'components/responses/error.yaml#/401'
        '403':
          $ref: 'components/responses/error.yaml#/403'
        '404':
          $ref: 'components/responses/error.yaml#/404'

  /workspaces/{workspaceId}/direct-chats/{directChatId}/messages/{messageId}/reactions:
    post:
      operationId: addReactionToDirectChatMessage
      tags: [ Reaction ]
      summary: Add a reaction to a message in a direct chat
      description: Add a reaction to a specific message within a direct chat. The authenticated user will be set as the author of the reaction. Only members of the direct chat can add reactions to its messages.
      security:
        - TokenAuth: [ ]
      parameters:
        - $ref: 'components/parameters/workspace.yaml#/WorkspaceIDParameter'
        - $ref: 'components/parameters/directChat.yaml#/DirectChatIDParameter'
        - $ref: 'components/parameters/message.yaml#/MessageIDParameter'

      requestBody:
        $ref: 'components/requestBodies/reaction.yaml#/AddReactionRequest'

      responses:
        '201':
          description: Reaction added successfully

        '400':
          $ref: 'components/responses/error.yaml#/400'
        '401':
          $ref: 'components/responses/error.yaml#/401'
        '403':
          $ref: 'components/responses/error.yaml#/403'
        '404':
          $ref: 'components/responses/error.yaml#/404'

  /workspaces/{workspaceId}/direct-chats/{directChatId}/messages/{messageId}/reactions/{reactionId}:
    delete:
      operationId: removeReactionFromDirectChatMessage
      tags: [ Reaction ]
      summary: Remove a reaction from a message in a direct chat
      description: Remove an existing reaction from a specific message within a direct chat. Only the author of the reaction or workspace admins can remove reactions.
      security:
        - TokenAuth: [ ]
      parameters:
        - $ref: 'components/parameters/workspace.yaml#/WorkspaceIDParameter'
        - $ref: 'components/parameters/directChat.yaml#/DirectChatIDParameter'
        - $ref: 'components/parameters/message.yaml#/MessageIDParameter'
        - $ref: 'components/parameters/reaction.yaml#/ReactionIDParameter'

      responses:
        '200':
          description: Reaction removed successfully

        '400':
          $ref: 'components/responses/error.yaml#/400'
        '401':
          $ref: 'components/responses/error.yaml#/401'
        '403':
          $ref: 'components/responses/error.yaml#/403'
        '404':
          $ref: 'components/responses/error.yaml#/404'

  # ----- Attachment -----
  /workspaces/{workspaceId}/channels/{channelId}/messages/{messageId}/attachments/{attachmentId}:
    delete:
      operationId: deleteAttachmentFromChannelMessage
      tags: [ Attachment ]
      summary: Delete an attachment from a message in a channel
      description: Delete an existing attachment from a specific message within a channel. Only the author of the message or workspace admins can delete attachments.
      security:
        - TokenAuth: [ ]
      parameters:
        - $ref: 'components/parameters/workspace.yaml#/WorkspaceIDParameter'
        - $ref: 'components/parameters/channel.yaml#/ChannelIDParameter'
        - $ref: 'components/parameters/message.yaml#/MessageIDParameter'
        - $ref: 'components/parameters/attachment.yaml#/AttachmentIDParameter'

      responses:
        '200':
          description: Attachment deleted successfully

        '400':
          $ref: 'components/responses/error.yaml#/400'
        '401':
          $ref: 'components/responses/error.yaml#/401'
        '403':
          $ref: 'components/responses/error.yaml#/403'
        '404':
          $ref: 'components/responses/error.yaml#/404'

  # ----- User -----
  /users/me:
    get:
      operationId: getCurrentUserProfile
      tags: [ User ]
      summary: Get the profile of the currently authenticated user
      description: Retrieve the profile information of the currently authenticated user, including their name, email, profile picture URL, and the list of workspaces they are a member of.
      security:
        - TokenAuth: [ ]

      responses:
        '200':
          $ref: 'components/responses/user.yaml#/CurrentUserProfileResponse'

        '401':
          $ref: 'components/responses/error.yaml#/401'
        '404':
          $ref: 'components/responses/error.yaml#/404'

    patch:
      operationId: updateCurrentUserProfile
      tags: [ User ]
      summary: Update the profile of the currently authenticated user
      description: Update the profile information of the currently authenticated user, such as their name and profile picture. The email cannot be updated through this endpoint. To change the email, users must contact support.
      security:
        - TokenAuth: [ ]

      requestBody:
        $ref: 'components/requestBodies/user.yaml#/UpdateCurrentUserProfileRequest'

      responses:
        '200':
          description: User profile updated successfully

        '400':
          $ref: 'components/responses/error.yaml#/400'
        '401':
          $ref: 'components/responses/error.yaml#/401'
        '404':
          $ref: 'components/responses/error.yaml#/404'

    delete:
      operationId: deleteCurrentUserAccount
      tags: [ User ]
      summary: Delete the account of the currently authenticated user
      description: Permanently delete the account of the currently authenticated user. This action cannot be undone and will remove all user data from the system. Users will be asked to confirm this action before proceeding.
      security:
        - TokenAuth: [ ]

      responses:
        '200':
          description: User account deleted successfully

        '400':
          $ref: 'components/responses/error.yaml#/400'
        '401':
          $ref: 'components/responses/error.yaml#/401'
          
  /users/{emailRegex}:
    get:
      operationId: getUserProfileByEmail
      tags: [ User ]
      summary: Get the profile of a user by email
      description: Retrieve the profile information of a user by their email address. This endpoint is useful for searching users when adding them to a workspace. Only workspace owners and admins can search for users by email.
      security:
        - TokenAuth: [ ]

      parameters:
        - $ref: 'components/parameters/user.yaml#/UserEmailRegexParameter'

      responses:
        '200':
