CreateChannelRequest:
  required: true
  content:
    application/json:
      schema:
        type: object
        required: [ name ]
        properties:
          name:
            type: string
            description: The name of the channel

UpdateChannelNameRequest:
  required: true
  content:
    application/json:
      schema:
        type: object
        required: [ name ]
        properties:
          name:
            type: string
            description: The new name of the channel