RegisterRequest:
  required: true
  content:
    multipart/form-data:
      schema:
        type: object
        required: [ name, surname, email, password ]
        properties:
          name:
            type: string
            example: John
          surname:
            type: string
            example: Doe
          email:
            type: string
            format: email
            example: john.doe@example.com
          password:
            type: string
            format: password
            example: Qwerty123!@#
          avatar:
            type: string
            format: binary
            description: Optional avatar image file

LoginRequest:
  required: true
  content:
    application/json:
      schema:
        type: object
        required: [ email, password ]
        properties:
          email:
            type: string
            format: email
            example: john.doe@example.com
          password:
            type: string
            format: password
            example: Qwerty123!@#

GoogleAuthRequest:
  required: true
  content:
    application/json:
      schema:
        type: object
        required: [ token ]
        properties:
          token:
            type: string
            description: Google OAuth token obtained from the client