Workspace:
  type: object
  required: [ id, name, logoUrl, userRole, channels, users ]
  properties:
    id:
      type: string
      example: 123e4567-e89b-12d3-a456-426614174000
    name:
      type: string
      example: My Workspace
    logoUrl:
      type: string
      format: uri
      example: https://example.com/workspace-logo.png
    userRole:
      type: string
      enum: [ owner, admin, member ]
      description: The role of the authenticated user within the workspace
    channels:
      type: array
      items:
        $ref: 'channel.yaml#/Channel'
      description: List of channels within the workspace
    users:
      type: array
      items:
        $ref: 'user.yaml#/User'
      description: List of users who are members of the workspace