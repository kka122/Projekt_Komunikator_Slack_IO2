Attachment:
  type: object
  required: [ id, filename, url, size ]
  properties:
    id:
      type: string
      description: Unique identifier for the attachment.
    filename:
      type: string
      description: Name of the attached file.
    url:
      type: string
      format: uri
      description: URL where the attachment can be accessed.
    size:
      type: integer
      description: Size of the attached file in bytes.