User:
  type: object
  required: [ id, name, surname, email, avatarUrl, status ]
  properties:
    id:
      type: string
      description: Unique identifier for the user
    name:
      type: string
      description: Name of the user
    surname:
      type: string
      description: Surname of the user
    email:
      type: string
      description: Email address of the user
    avatarUrl:
      type: string
      description: URL of the user's avatar image
    status:
      type: string
      enum: [ online, meeting, vacation, notDisturb, workAtHome, freeTime, offline ]