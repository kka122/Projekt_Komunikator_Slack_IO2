PageParameter:
  name: page
  in: path
  description: The page number to retrieve.
  required: true
  schema:
    type: integer
    minimum: 1
    default: 1

PageSizeParameter:
  name: pageSize
  in: path
  description: The number of items to retrieve per page.
  required: true
  schema:
    type: integer
    minimum: 1
    maximum: 50
    default: 20