name: Generate Shared Schemas

on:
  push:
    branches:
      - main
    paths:
      - 'shared/**'
      - '.github/workflows/shared-generating.yml'

jobs:
  generate-schemas:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install Node tools
        run: |
          npm install -g @redocly/cli
          npm install -g orval
          npm install -d orval

      - name: Generate Zod + React Query Schemas
        run: orval --config shared/generators/orval.config.ts

      - name: Generate Redocly Docs Schemas
        run: redocly build-docs shared/openapi/openapi.yaml --output docs/index.html

      - name: Commit and push generated files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update generated schemas"
          file_pattern: './docs/index.html, ./app/schemas/**/*'