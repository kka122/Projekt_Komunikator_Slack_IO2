name: Generate App Documentation

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/app-docs.yml'
      - 'app/src/**/*.ts'
      - 'app/src/**/*.tsx'
      - 'shared/generators/typedoc/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: app-docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-app-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install TypeDoc
        run: npm install -g typedoc

      - name: Install local app dependencies
        working-directory: app
        run: npm install

      - name: Generate TypeDoc documentation
        run: typedoc --options shared/generators/typedoc/typedoc.json

      - name: Commit and push generated documentation
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: Update app documentation"
          file_pattern: 'docs/tsdoc/*'