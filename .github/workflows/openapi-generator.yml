name: Generate OpenAPI Schemas and Documentation

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/openapi-generator.yml'
      - 'shared/openapi/**'
      - 'shared/generators/orval/**'

permissions:
  contents: write

concurrency:
  group: openapi-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-schemas-and-docs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: Install Node tools
        run: npm install -g @redocly/cli orval

      - name: Install local orval (for config resolution)
        run: npm install
        working-directory: shared/generators/orval

      - name: Generate Zod + React Query Schemas
        run: orval --config shared/generators/orval/orval.config.ts

      - name: Generate Redocly Docs
        run: redocly build-docs shared/openapi/openapi.yaml --output docs/openapi.html

      - name: Commit and push generated files
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update generated schemas"
          file_pattern: 'docs/openapi.html app/schemas/**/*'
